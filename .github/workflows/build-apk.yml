name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Numero de version unique par build
        run: |
          sed -i "s/versionCode = 100/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          sed -i "s/versionName = \"1.2-drive\"/versionName = \"1.2-b${{ github.run_number }}\"/" app/build.gradle.kts
          grep -E "versionCode|versionName" app/build.gradle.kts

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          set -o pipefail
          gradle assembleDebug --no-daemon --console=plain 2>&1 | tee build.log
          STATUS=${PIPESTATUS[0]}
          echo
          echo "===== ERREURS PRINCIPALES ====="
          grep -nE '(^e: |\[ksp\]|What went wrong|Execution failed|Caused by:|error:)' build.log | head -80 || true
          exit "$STATUS"

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
