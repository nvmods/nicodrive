name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire le projet du zip
        run: unzip -o NicoBudget_v1.1_drive.zip

      - name: Diagnostic de l'arborescence
        run: |
          echo "===== Racine du repo ====="
          ls -la
          echo "===== Dossier fixes ====="
          ls -la fixes/ || echo "PAS DE DOSSIER fixes"
          echo "===== Projet extrait ====="
          ls -la NicoBudget/ NicoBudget/app/

      - name: Appliquer le build.gradle.kts corrige
        run: |
          cp fixes/app-build.gradle.kts NicoBudget/app/build.gradle.kts
          echo "===== Contenu applique ====="
          cat NicoBudget/app/build.gradle.kts

      - name: Tolerer l'ecart de cible JVM (warning au lieu d'erreur)
        run: |
          echo "" >> NicoBudget/gradle.properties
          echo "kotlin.jvm.target.validation.mode=warning" >> NicoBudget/gradle.properties
          echo "===== gradle.properties ====="
          cat NicoBudget/gradle.properties

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: NicoBudget

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
