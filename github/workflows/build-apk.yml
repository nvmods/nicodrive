name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire le projet du zip
        run: unzip -o NicoBudget_v1.1_drive.zip

      - name: Reecrire app/build.gradle.kts (JVM 17)
        shell: bash
        run: |
          cat > NicoBudget/app/build.gradle.kts << 'FIN_DU_FICHIER'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("com.google.devtools.ksp")
              id("org.jetbrains.kotlin.plugin.compose")
          }

          android {
              namespace = "com.example.nicobudget"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.example.nicobudget"
                  minSdk = 26
                  targetSdk = 35
                  versionCode = 2
                  versionName = "1.1-drive"
              }

              buildFeatures {
                  compose = true
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }

              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                  }
              }
          }

          kotlin {
              jvmToolchain(17)
          }

          dependencies {
              implementation(platform("androidx.compose:compose-bom:2025.01.01"))
              implementation("androidx.activity:activity-compose:1.10.0")
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.navigation:navigation-compose:2.8.5")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.7")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7")
              implementation("androidx.compose.runtime:runtime-livedata")
              implementation("androidx.room:room-runtime:2.6.1")
              implementation("androidx.room:room-ktx:2.6.1")
              ksp("androidx.room:room-compiler:2.6.1")
              implementation("com.github.PhilJay:MPAndroidChart:v3.1.0")
              implementation("com.tom-roush:pdfbox-android:2.0.27.0")
              debugImplementation("androidx.compose.ui:ui-tooling")
              debugImplementation("androidx.compose.ui:ui-test-manifest")
          }
          FIN_DU_FICHIER
          echo "===== Verification du fichier ====="
          tail -5 NicoBudget/app/build.gradle.kts

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: NicoBudget

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
