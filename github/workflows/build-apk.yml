name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Vérifier les fichiers
        run: |
          test -f NicoBudget_v1.1_drive.zip || {
            echo "::error::NicoBudget_v1.1_drive.zip est introuvable"
            exit 1
          }

          test -f fixes/app-build.gradle.kts || {
            echo "::error::fixes/app-build.gradle.kts est introuvable"
            exit 1
          }

      - name: Extraire le projet
        run: |
          rm -rf NicoBudget
          unzip -o NicoBudget_v1.1_drive.zip

          echo "===== Projet extrait ====="
          find NicoBudget -maxdepth 3 -type f | sort

          test -f NicoBudget/settings.gradle.kts || {
            echo "::error::NicoBudget/settings.gradle.kts est introuvable"
            exit 1
          }

          test -f NicoBudget/app/build.gradle.kts || {
            echo "::error::NicoBudget/app/build.gradle.kts est introuvable"
            exit 1
          }

      - name: Appliquer le build.gradle.kts corrigé
        run: |
          cp fixes/app-build.gradle.kts NicoBudget/app/build.gradle.kts

          echo "===== build.gradle.kts utilisé ====="
          cat NicoBudget/app/build.gradle.kts

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Installer Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Afficher les versions
        run: |
          java -version
          gradle --version

      - name: Compiler l'APK debug
        working-directory: NicoBudget
        run: |
          gradle clean assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      - name: Vérifier l'APK
        run: |
          echo "===== APK générés ====="
          find NicoBudget/app/build/outputs -type f -name "*.apk" -ls

          test -f NicoBudget/app/build/outputs/apk/debug/app-debug.apk || {
            echo "::error::L'APK debug n'a pas été généré"
            exit 1
          }

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30            exit 1
          }

          test -d NicoBudget/app || {
            echo "::error::Le dossier NicoBudget/app est introuvable"
            exit 1
          }

          test -f fixes/app-build.gradle.kts || {
            echo "::error::Le correctif fixes/app-build.gradle.kts est introuvable"
            exit 1
          }

      - name: Appliquer le build.gradle.kts corrigé
        run: |
          cp fixes/app-build.gradle.kts NicoBudget/app/build.gradle.kts

          echo "===== build.gradle.kts appliqué ====="
          cat NicoBudget/app/build.gradle.kts

      - name: Configurer Gradle
        run: |
          touch NicoBudget/gradle.properties

          if ! grep -q "^kotlin.jvm.target.validation.mode=" NicoBudget/gradle.properties; then
            echo "kotlin.jvm.target.validation.mode=warning" >> NicoBudget/gradle.properties
          fi

          echo "===== gradle.properties ====="
          cat NicoBudget/gradle.properties

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Rendre le wrapper exécutable
        run: chmod +x gradlew
        working-directory: NicoBudget

      - name: Afficher les versions
        run: |
          java -version
          ./gradlew --version
        working-directory: NicoBudget

      - name: Compiler l'APK debug
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace
        working-directory: NicoBudget

      - name: Vérifier l'APK
        run: |
          echo "===== APK générés ====="
          find NicoBudget/app/build/outputs/apk -type f -name "*.apk" -ls

          test -f NicoBudget/app/build/outputs/apk/debug/app-debug.apk || {
            echo "::error::L'APK debug n'a pas été généré"
            exit 1
          }

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
