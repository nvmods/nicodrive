name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire le projet du zip
        run: unzip -o NicoBudget_v1.1_drive.zip

      - name: Aligner les cibles JVM (Java 17 = Kotlin 17)
        run: |
          cat >> NicoBudget/app/build.gradle.kts << 'EOF'

          android {
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
              compilerOptions.jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
          }
          EOF

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: NicoBudget

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
