name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extraire le projet du zip
        run: unzip -o NicoBudget_v1.1_drive.zip

      - name: Appliquer le build.gradle.kts corrige
        run: |
          cp fixes/app-build.gradle.kts NicoBudget/app/build.gradle.kts
          echo "===== Verification ====="
          grep -n "jvmToolchain\|room" NicoBudget/app/build.gradle.kts

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: NicoBudget

      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: NicoBudget-debug-apk
          path: NicoBudget/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
